default:
  logger:
    log_level: "INFO"
  service:
    host: "0.0.0.0"
    port: 8282
    cert_file: "ssl_certs/localhost.crt"
    cert_key: "ssl_certs/localhost.key"
  chat_engine:
    model_root: "models"
    concurrent_limit: 5
    handler_search_path:
      - "src/handlers"
    handler_configs:
      LamClient:
        module: client/ws_lam_client/ws_lam_client_handler
        asset_path: "lam_samples/zhangxu.zip"
        # max time a session will last for
        connection_ttl: 900
        upstream_mode: 'ws'
      # === 打断处理器 - 接收 INTERRUPT 信号并执行流取消 ===
      InterruptHandler:
        module: logic/interrupt/interrupt_handler
      SileroVad:
        module: vad/silerovad/vad_handler_silero
        speaking_threshold: 0.15
        start_delay: 2048
        end_delay: 5000
        buffer_look_back: 5000
        speech_padding: 512
        volume_threshold: -30
      SenseVoice:
        enabled: True
        module: asr/sensevoice/asr_handler_sensevoice
        model_name: "iic/SenseVoiceSmall"
      CosyVoice:
        enabled: True
        module: tts/bailian_tts/tts_handler_cosyvoice_bailian
        voice: "longlaobo"
        model_name: "cosyvoice-v2"
        # api_key: "" # default=os.getenv("DASHSCOPE_API_KEY")
        api_key: "sk-79cb56da3ea14f0e86b45451b92186e6"
      LLMOpenAICompatible:
        enabled: True
        module: llm/openai_compatible/llm_handler_openai_compatible
        model_name: "qwen-plus"
        enable_video_input: False # ensure your llm support video input
        history_length: 20
        # model_name: "gemini-2.0-flash"
        system_prompt: "你现在是唐代草圣张旭。性格狂放、嗜酒如命，视书法为生命的律动。用简短的两三句话回答用户的问题，语气要豪放不羁。如果用户请你做自我介绍，你必须用张旭的口吻豪放地介绍自己，提到你是吴地张旭，世人称你为草圣，嗜酒如命，每饮必醉，醉后呼叫狂走然后落笔成书。如果用户问你书法相关的内容，请用一句话描述你的心境。如果用户展示动作或舞蹈，请用诗意语言给出简短点评。"
        api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
        # api_url: 'http://127.0.0.1:11434/v1' # ollama
        # api_url: 'https://generativelanguage.googleapis.com/v1beta/openai/'
        # api_key: "" # default=os.getenv("DASHSCOPE_API_KEY")
        api_key: "sk-79cb56da3ea14f0e86b45451b92186e6"
      # Dify:
      #   enabled: True
      #   module: llm/dify/llm_handler_dify
      #   api_key: app-J3LiQRqh4MrOOvS6vpyrgIOW
      #   api_url: 'http://localhost/v1'
      LAM_Driver:
        module: avatar/lam/avatar_handler_lam_audio2expression
