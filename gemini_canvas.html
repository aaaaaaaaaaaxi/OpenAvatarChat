<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INK IN MOTION - 墨舞</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;500;900&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f4f4f1; /* 宣纸白背景 */
            color: #1a1a1a; /* 墨黑色文字 */
            font-family: 'Noto Serif SC', serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, transparent 0%, rgba(255,255,255,0.2) 100%);
            transition: opacity 1s ease;
        }

        /* 数字人容器 */
        #avatar-container {
            position: fixed;
            left: 5%;
            bottom: 10%;
            width: 350px;
            height: 500px;
            z-index: 15;
            pointer-events: none;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            transition: all 1s ease;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.1));
        }

        #avatar-image {
            width: 100%;
            height: auto;
            object-fit: contain;
            mask-image: linear-gradient(to top, transparent 0%, black 20%, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to top, transparent 0%, black 20%, black 80%, transparent 100%);
            opacity: 0;
            transform: translateY(20px);
            filter: grayscale(1) contrast(1.2); /* 强化水墨质感 */
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }

        .hidden { display: none !important; }
        .fade-out { opacity: 0; pointer-events: none; }
        
        .chat-box {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 20px;
            padding: 20px;
            max-width: 450px;
            width: 90%;
            bottom: 50px;
            right: 5%; 
            position: absolute;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .ink-button {
            border: 1.5px solid #000;
            padding: 10px 30px;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #000;
            font-weight: 500;
        }

        .ink-button:hover {
            background: #000;
            color: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .calligraphy-card {
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .calligraphy-card:hover {
            transform: scale(1.05) translateY(-10px);
        }
        .calligraphy-card .bg-card {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0,0,0,0.1);
        }

        @keyframes flow {
            0% { filter: blur(1px) contrast(1.2); transform: scale(1); }
            50% { filter: blur(3px) contrast(1.5); transform: scale(1.02); }
            100% { filter: blur(1px) contrast(1.2); transform: scale(1); }
        }
        .ink-flow { animation: flow 5s infinite; color: #000; }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        /* 滚动条 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="avatar-container">
        <img id="avatar-image" src="https://api.clio.com/v1/attachments/cc827c92-6cac-4fe7-95fa-d34524b3d382/download" alt="草圣张旭">
    </div>

    <!-- 阶段 1: 首页 -->
    <div id="screen-home" class="overlay">
        <h1 class="text-7xl md:text-9xl font-black tracking-widest mb-8 text-center text-black">INK IN MOTION</h1>
        <p class="text-xl tracking-[0.5em] mb-12 opacity-40 text-black">墨 舞 · 灵 动</p>
        <button onclick="startExperience()" class="ink-button">点击继续</button>
    </div>

    <!-- 阶段 2: 对话 -->
    <div id="screen-dialogue" class="overlay hidden opacity-0">
        <div id="ai-status" class="absolute top-10 right-10 text-xs tracking-widest opacity-30 text-black uppercase">Digital Twin: Zhang Xu</div>
        <div class="chat-box" id="chat-ui">
            <div id="chat-history" class="h-48 overflow-y-auto mb-4 text-sm space-y-3 pr-2 custom-scrollbar text-gray-800">
                <div class="opacity-60 italic">张旭：狂草之美，不在形而在势。某乃张旭，阁下为何而来？</div>
            </div>
            <div class="flex gap-2">
                <input type="text" id="user-input" class="bg-black/5 border-none rounded-full px-4 py-2 flex-grow text-sm focus:outline-none focus:ring-1 focus:ring-black/20 text-black" placeholder="与草圣对话...">
                <button onclick="sendMessage()" id="send-btn" class="bg-black text-white rounded-full p-2 w-10 h-10 flex items-center justify-center transition-transform hover:scale-110">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
            <div id="chat-count" class="text-[10px] mt-2 opacity-20 text-right text-black">对话进度: 0/3</div>
        </div>
    </div>

    <!-- 阶段 3: 书法选择 -->
    <div id="screen-selection" class="overlay hidden opacity-0">
        <h2 class="text-3xl mb-12 tracking-widest text-black">请择一帖，见字起舞</h2>
        <div id="loading-insight" class="hidden text-xs mb-4 opacity-40 loading-dots text-black">✨ 张旭正在为你解字</div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-8 px-10">
            <div onclick="requestInsight('古诗四帖')" class="calligraphy-card text-center">
                <div class="bg-card h-64 w-40 flex items-center justify-center mb-4">
                    <span class="[writing-mode:vertical-rl] text-2xl tracking-[0.5em] text-black/80 font-bold">古诗四帖</span>
                </div>
                <p class="text-xs opacity-40 text-black">藏于辽宁省博物馆</p>
            </div>
            <div onclick="requestInsight('肚痛帖')" class="calligraphy-card text-center">
                <div class="bg-card h-64 w-40 flex items-center justify-center mb-4">
                    <span class="[writing-mode:vertical-rl] text-2xl tracking-[0.5em] text-black/80 font-bold">肚痛帖</span>
                </div>
                <p class="text-xs opacity-40 text-black">西安碑林刻本</p>
            </div>
            <div onclick="requestInsight('晚复帖')" class="calligraphy-card text-center">
                <div class="bg-card h-64 w-40 flex items-center justify-center mb-4">
                    <span class="[writing-mode:vertical-rl] text-2xl tracking-[0.5em] text-black/80 font-bold">晚复帖</span>
                </div>
                <p class="text-xs opacity-40 text-black">草书代表作</p>
            </div>
            <div onclick="requestInsight('草书千字文')" class="calligraphy-card text-center">
                <div class="bg-card h-64 w-40 flex items-center justify-center mb-4">
                    <span class="[writing-mode:vertical-rl] text-2xl tracking-[0.5em] text-black/80 font-bold">草书千字文</span>
                </div>
                <p class="text-xs opacity-40 text-black">狂草巅峰之作</p>
            </div>
        </div>
    </div>

    <!-- 阶段 4: 动画 -->
    <div id="screen-animation" class="overlay hidden opacity-0">
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
             <div id="insight-text" class="max-w-md text-center text-lg italic opacity-0 px-6 leading-relaxed text-black/60"></div>
        </div>
        <div class="absolute bottom-10 flex flex-col items-center">
            <p id="dance-word" class="text-8xl font-bold mb-4 ink-flow"></p>
            <button onclick="goToCapture()" class="ink-button text-xs">✨ 跳过动画：进入肢体捕捉</button>
        </div>
    </div>

    <!-- 阶段 5: 捕捉 -->
    <div id="screen-capture" class="overlay hidden opacity-0">
        <video id="webcam" autoplay playsinline class="absolute inset-0 w-full h-full object-cover opacity-10 grayscale"></video>
        <canvas id="motion-canvas" class="absolute inset-0 w-full h-full"></canvas>
        
        <div id="feedback-panel" class="z-30 max-w-lg bg-white/90 p-8 rounded-xl border border-black/10 hidden shadow-2xl">
            <h3 class="text-xl mb-4 border-b border-black/5 pb-2 text-black">✨ 草圣舞评</h3>
            <div id="motion-feedback" class="text-sm leading-relaxed mb-6 text-gray-700"></div>
            <button onclick="location.reload()" class="ink-button w-full text-xs">重回大唐</button>
        </div>

        <div id="capture-ui" class="z-20 text-center pointer-events-none">
            <h2 class="text-2xl mb-4 text-black">动作捕捉中</h2>
            <p class="text-sm opacity-40 text-black">舞动全身，化气为墨</p>
            <div class="mt-8 flex gap-4 pointer-events-auto">
                <button onclick="stopAndReview()" class="ink-button text-xs px-4">✨ 结束并请张旭评点</button>
            </div>
        </div>
    </div>

    <script>
        // --- 核心变量 ---
        let scene, camera, renderer, particles;
        let currentStage = 'home';
        let chatCount = 0;
        const apiKey = ""; 

        // --- 初始化 Three.js 背景 ---
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 4000; i++) { // 减少粒子数，黑点在白底上更清晰
                vertices.push(THREE.MathUtils.randFloatSpread(250), THREE.MathUtils.randFloatSpread(250), THREE.MathUtils.randFloatSpread(250));
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            
            // 将粒子改为墨黑色
            const material = new THREE.PointsMaterial({ 
                color: 0x000000, 
                size: 0.6, 
                transparent: true, 
                opacity: 0.15 
            });
            
            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            camera.position.z = 120;

            function animate() {
                requestAnimationFrame(animate);
                if (particles) {
                    particles.rotation.y += 0.0005;
                    particles.rotation.x += 0.0002;
                }
                renderer.render(scene, camera);
            }
            animate();
        }

        function transitionScreens(fromId, toId) {
            const from = document.getElementById(fromId);
            const to = document.getElementById(toId);
            if (!from || !to) return;
            
            from.classList.add('fade-out');
            setTimeout(() => {
                from.classList.add('hidden');
                to.classList.remove('hidden');
                setTimeout(() => to.classList.remove('opacity-0'), 50);
                updateAvatarPosition(toId);
            }, 800);
        }

        function updateAvatarPosition(stageId) {
            const avatar = document.getElementById('avatar-container');
            const img = document.getElementById('avatar-image');
            if (!avatar || !img) return;
            
            if (stageId === 'screen-home') {
                gsap.to(img, { opacity: 0, y: 50, duration: 1 });
            } else if (stageId === 'screen-selection') {
                gsap.to(avatar, { left: '2%', scale: 0.8, duration: 1.5 });
                gsap.to(img, { opacity: 0.6, y: 0, duration: 1 });
            } else if (stageId === 'screen-capture') {
                gsap.to(img, { opacity: 0.2, duration: 1 });
            } else {
                gsap.to(avatar, { left: '5%', scale: 1, duration: 1.5 });
                gsap.to(img, { opacity: 0.8, y: 0, duration: 1 });
            }
        }

        function startExperience() {
            transitionScreens('screen-home', 'screen-dialogue');
            currentStage = 'dialogue';
            if (particles && particles.scale) {
                gsap.to(particles.scale, { x: 1.2, y: 1.2, z: 1.2, duration: 3 });
                gsap.to(particles.material, { opacity: 0.25, duration: 2 });
            }
        }

        // --- Gemini API ---

        async function speak(text) {
            try {
                gsap.to('#avatar-image', { scale: 1.03, duration: 0.2, yoyo: true, repeat: 5 });
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `用一种粗犷、豪放、醉意朦胧的唐代文人语气说：${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Iapetus" } } }
                        }
                    })
                });
                const result = await response.json();
                const pcmData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (pcmData) playAudioFromPCM(pcmData);
            } catch (e) { console.error("TTS Error", e); }
        }

        function playAudioFromPCM(base64Data) {
            const binaryString = atob(base64Data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            const wavHeader = createWavHeader(binaryString.length, 24000); 
            const blob = new Blob([wavHeader, bytes], { type: 'audio/wav' });
            const audio = new Audio(URL.createObjectURL(blob));
            audio.play();
        }

        function createWavHeader(dataLength, sampleRate) {
            const buffer = new ArrayBuffer(44);
            const view = new DataView(buffer);
            view.setUint32(0, 0x46464952, true); 
            view.setUint32(4, 36 + dataLength, true);
            view.setUint32(8, 0x45564157, true); 
            view.setUint32(12, 0x20746d66, true); 
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); 
            view.setUint16(22, 1, true); 
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x61746164, true); 
            view.setUint32(40, dataLength, true);
            return buffer;
        }

        async function sendMessage() {
            const inputEl = document.getElementById('user-input');
            const text = inputEl.value.trim();
            if (!text) return;

            appendMessage('你', text);
            inputEl.value = '';
            chatCount++;
            document.getElementById('chat-count').innerText = `对话进度: ${chatCount}/3`;

            try {
                const systemPrompt = "你现在是唐代草圣张旭。性格狂放、嗜酒如命，视书法为生命的律动。";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                const data = await response.json();
                const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
                appendMessage('张旭', aiResponse);
                speak(aiResponse.substring(0, 50));

                if (chatCount >= 3) {
                    setTimeout(() => {
                        appendMessage('系统', '张旭豪爽大笑，示意你选择一幅作品感悟其笔势...');
                        setTimeout(() => transitionScreens('screen-dialogue', 'screen-selection'), 2500);
                    }, 1500);
                }
            } catch (err) { appendMessage('张旭', "笔墨虽滞，意气不减！"); }
        }

        function appendMessage(sender, text) {
            const historyEl = document.getElementById('chat-history');
            const div = document.createElement('div');
            div.className = sender === '你' ? 'text-right text-gray-500' : 'text-left text-black font-medium';
            div.innerHTML = `<span class="opacity-30 text-[10px] block uppercase">${sender}</span> ${text}`;
            historyEl.appendChild(div);
            historyEl.scrollTop = historyEl.scrollHeight;
        }

        async function requestInsight(workTitle) {
            document.getElementById('loading-insight').classList.remove('hidden');
            try {
                const prompt = `你是张旭。请用一句话描述你创作《${workTitle}》的心境。不超过40字。`;
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const insight = data.candidates?.[0]?.content?.parts?.[0]?.text;
                
                document.getElementById('loading-insight').classList.add('hidden');
                document.getElementById('insight-text').innerText = insight;
                
                transitionScreens('screen-selection', 'screen-animation');
                playDanceAnimation();
            } catch (e) { transitionScreens('screen-selection', 'screen-animation'); playDanceAnimation(); }
        }

        const words = ["孤", "云", "独", "去", "闲", "万", "象", "生"];
        function playDanceAnimation() {
            const wordEl = document.getElementById('dance-word');
            const insightEl = document.getElementById('insight-text');
            gsap.to(insightEl, { opacity: 0.6, duration: 2 });
            
            let idx = 0;
            const interval = setInterval(() => {
                if (idx >= words.length) {
                    clearInterval(interval);
                    setTimeout(goToCapture, 2000);
                    return;
                }
                wordEl.innerText = words[idx];
                gsap.fromTo(wordEl, { scale: 0.3, opacity: 0, rotate: -20 }, { scale: 1.2, opacity: 1, rotate: 0, duration: 1.2, ease: "expo.out" });
                idx++;
            }, 1200);
        }

        function goToCapture() {
            transitionScreens('screen-animation', 'screen-capture');
            startWebcam();
        }

        async function startWebcam() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('motion-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                function draw() {
                    // 墨水扩散效果
                    ctx.fillStyle = 'rgba(244, 244, 241, 0.1)'; 
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    ctx.beginPath();
                    ctx.arc(x, y, Math.random()*12, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.2})`;
                    ctx.fill();
                    if (document.getElementById('screen-capture').classList.contains('hidden')) return;
                    requestAnimationFrame(draw);
                }
                draw();
            } catch (e) { console.error("Camera access failed", e); }
        }

        async function stopAndReview() {
            document.getElementById('capture-ui').classList.add('hidden');
            const feedbackPanel = document.getElementById('feedback-panel');
            const feedbackText = document.getElementById('motion-feedback');
            feedbackPanel.classList.remove('hidden');
            feedbackText.innerText = "张旭正在研墨沉思...";

            try {
                const prompt = "你是张旭。用户跳了一段模仿草书的舞蹈。请给出简短点评。";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const review = data.candidates?.[0]?.content?.parts?.[0]?.text;
                feedbackText.innerText = review;
                speak(review.substring(0, 60));
            } catch (e) {
                feedbackText.innerText = "好一个翩若惊鸿！";
            }
        }

        window.onload = initThree;
        document.getElementById('user-input')?.addEventListener('keypress', e => e.key === 'Enter' && sendMessage());
    </script>
</body>
</html>
